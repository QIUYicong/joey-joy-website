<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诗岚观 · Joey's Joy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Serif+SC:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/zen.css">
  <style>
    .content {
      position: relative; z-index: 10;
      max-width: 1500px; margin: 0 auto;
      padding: 24px 56px 80px;
    }

    /* mountain ink-wash band behind hero */
    .ink-band {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 240px;
      pointer-events: none;
      opacity: 0.32;
      z-index: 0;
      mask-image: linear-gradient(180deg, black 40%, transparent);
      -webkit-mask-image: linear-gradient(180deg, black 40%, transparent);
    }
    .ink-band svg { width: 100%; height: 100%; display: block; }

    /* ── grid ─────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      position: relative; z-index: 1;
    }

    .work {
      position: relative;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
    }
    .work .thumb {
      width: 100%; aspect-ratio: 5/3;
      background:
        radial-gradient(ellipse at 40% 30%, rgba(214,161,96,.10), transparent 60%),
        linear-gradient(160deg, #1f1812 0%, #14100b 100%);
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--hair);
      position: relative;
      overflow: hidden;
    }
    .work .thumb::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.30'/></svg>");
      mix-blend-mode: overlay;
      opacity: .6;
    }
    .work .thumb svg { width: 60%; height: auto; z-index: 1; }
    .work .thumb svg :where(path, circle, line, rect, polygon, polyline) {
      stroke: var(--copper); fill: none;
      stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .work .info { padding: 28px 30px 32px; position: relative; }
    .work .ti {
      font-family: var(--brush);
      font-size: 2.4rem; letter-spacing: 0.18em;
      color: var(--ink);
      margin-bottom: 10px;
      line-height: 1;
    }
    .work:hover .ti { color: var(--copper); }
    .work .date {
      font-family: var(--mono);
      font-size: 0.72rem; letter-spacing: 0.22em;
      color: var(--ink-dim);
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .work .desc {
      font-family: var(--han);
      font-size: 1rem; line-height: 1.85;
      color: var(--ink-soft);
    }
    .work .stamp {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px;
      display: grid; place-items: center;
      font-family: var(--brush);
      font-size: 0.9rem;
      color: var(--paper);
      background: var(--cinnabar);
      border: 1px solid color-mix(in srgb, var(--cinnabar) 70%, black);
      opacity: 0.8;
    }

    /* ── filter bar ───────────────────────────────────── */
    .filters {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; gap: 16px;
      margin-bottom: 30px;
    }
    .filters .row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
    }
    .filters .count {
      font-family: var(--mono);
      font-size: 0.74rem; letter-spacing: 0.2em;
      color: var(--ink-dim);
      text-transform: uppercase;
      margin-right: 8px;
    }
    .chip {
      font-family: var(--han);
      font-size: 0.82rem; letter-spacing: 0.06em;
      color: var(--ink-soft);
      padding: 5px 14px;
      border: 1px solid var(--hair);
      background: color-mix(in srgb, var(--ink) 4%, transparent);
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .chip:hover { color: var(--copper); border-color: color-mix(in srgb, var(--copper) 50%, var(--hair)); }
    .chip.active {
      color: var(--paper);
      background: var(--copper);
      border-color: var(--copper);
    }
    .chip .n { font-family: var(--mono); font-size: 0.7rem; opacity: 0.6; margin-left: 6px; }

    /* poem card extras */
    .work .info { display: flex; flex-direction: column; min-height: 150px; }
    .work .desc {
      flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .work .tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 16px;
    }
    .work .tags span {
      font-family: var(--mono);
      font-size: 0.62rem; letter-spacing: 0.12em;
      color: var(--ink-dim);
      padding: 2px 8px;
      border: 1px solid var(--hair);
      text-transform: uppercase;
    }
    .work .thumb .glyph {
      font-family: var(--brush);
      font-size: 3.4rem; color: var(--copper); opacity: 0.85;
      z-index: 1; user-select: none;
    }
    .state-msg {
      grid-column: 1 / -1;
      text-align: center; padding: 80px 0;
      font-family: var(--han); color: var(--ink-dim);
      font-size: 1.05rem; letter-spacing: 0.1em;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .content { padding: 22px 22px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-theme="dark" data-fx="incense">

  <div class="zen-field"></div>
  <div class="zen-grain"></div>
  <div class="zen-vignette"></div>

  <div class="zen-stage">

    <header class="zen-topbar zen-rise">
      <div class="left">
        <a href="../index.html" class="zen-back">
          <span class="arrow"></span>
          <span>返 · Return</span>
        </a>
        <span class="zen-brand">
          <span class="seal">乔</span>
          <span class="mono dim">Joey&rsquo;s Joy</span>
        </span>
      </div>
      <div class="right">
        <span class="mono dim">卷 · 02 / 05</span>
        <span class="zen-live"><span class="pulse"></span><span class="mono small ghost">在线 · 26.05.24</span></span>
      </div>
    </header>

    <header class="zen-head zen-rise d1" style="position:relative;">
      <!-- ink-wash mountain silhouette -->
      <div class="ink-band">
        <svg viewBox="0 0 1500 240" preserveAspectRatio="none">
          <defs>
            <linearGradient id="m1" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#d6a160" stop-opacity="0.0"/>
              <stop offset="100%" stop-color="#d6a160" stop-opacity="0.7"/>
            </linearGradient>
            <linearGradient id="m2" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#ede1c4" stop-opacity="0.0"/>
              <stop offset="100%" stop-color="#ede1c4" stop-opacity="0.5"/>
            </linearGradient>
          </defs>
          <!-- far mountains -->
          <path d="M0 180 L120 130 L260 165 L380 110 L520 150 L660 95 L820 140 L960 105 L1120 145 L1260 100 L1400 140 L1500 130 L1500 240 L0 240 Z" fill="url(#m1)" opacity="0.55"/>
          <!-- middle range -->
          <path d="M0 210 L100 180 L240 200 L360 165 L500 195 L640 160 L800 195 L960 165 L1120 200 L1280 170 L1400 195 L1500 185 L1500 240 L0 240 Z" fill="url(#m2)" opacity="0.65"/>
        </svg>
      </div>

      <div class="zen-crumb">
        <span>Index</span><span class="sep">/</span>
        <span>Volume 02</span><span class="sep">/</span>
        <span class="here">诗岚观</span>
      </div>
      <h1>诗 岚 观<span class="h1-seal">吟</span></h1>
      <div class="en-title"><em>Personal Portfolio · Verse &amp; Vision</em></div>
      <div class="rule"></div>
    </header>

    <main class="content">

      <div class="filters zen-rise d2">
        <div class="row">
          <span class="count" id="count">— 首</span>
          <span class="chip active" data-view="featured" id="view-featured">精选 · Featured</span>
          <span class="chip" data-view="all" id="view-all">全部 · All</span>
        </div>
        <div class="row" id="tagrow"></div>
        <div class="row" id="yearrow"></div>
      </div>

      <div class="grid zen-rise d3" id="grid">
        <div class="state-msg" id="state">正在展卷……</div>
      </div>

    </main>

    <footer class="zen-foot">
      <span class="mono ghost">© MMXXVI · Joey&rsquo;s Joy</span>
      <span class="mono ghost">卷二 · 诗岚观 · Portfolio</span>
      <span class="mono ghost">Theme · Deep Wood</span>
    </footer>

  </div>

  <script src="../assets/zen-fx.js"></script>
  <script>
    /* ─── data-driven poetry grid ─── */
    const GLYPHS = ['吟','詩','韻','墨','風','月','山','川','雲','夢','念','寂'];
    const esc = s => (s || '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

    const state = {
      poems: [], view: 'featured', tag: null, year: null, meta: null,
    };

    function fmtDate(d) {                         // 2026-04-08 -> 2026 · 04
      if (!d) return '';
      const [y, m] = d.split('-');
      return `${y} · ${m}`;
    }

    function filtered() {
      let list = state.poems.slice();
      if (state.view === 'featured') list = list.filter(p => p.featured);
      if (state.tag)  list = list.filter(p => (p.tags || []).includes(state.tag));
      if (state.year) list = list.filter(p => String(p.year) === String(state.year));
      return list;
    }

    function render() {
      const grid = document.getElementById('grid');
      const list = filtered();
      const total = state.poems.length;
      const feat  = state.poems.filter(p => p.featured).length;
      document.getElementById('count').textContent =
        `共 ${total} 首 · 精选 ${feat} 首 · 现示 ${list.length}`;

      if (!list.length) {
        grid.innerHTML = '<div class="state-msg">此筛选下暂无诗作</div>';
        return;
      }
      grid.innerHTML = list.map((p, i) => `
        <div class="work zen-card" data-id="${p.id}">
          <div class="thumb"><span class="glyph">${GLYPHS[i % GLYPHS.length]}</span></div>
          <div class="info">
            <span class="stamp">吟</span>
            <div class="ti">${esc(p.title)}</div>
            <div class="date">${fmtDate(p.date)}</div>
            <div class="desc">${esc(p.excerpt)}</div>
            <div class="tags">${(p.tags || []).slice(0, 4).map(t => `<span>${esc(t)}</span>`).join('')}</div>
          </div>
        </div>`).join('');

      grid.querySelectorAll('.work').forEach(c => {
        c.addEventListener('click', () => {
          location.href = 'article.html?from=poetry&id=' + encodeURIComponent(c.dataset.id);
        });
      });
    }

    function buildChips() {
      // view toggle
      document.querySelectorAll('[data-view]').forEach(el => {
        el.addEventListener('click', () => {
          state.view = el.dataset.view;
          document.querySelectorAll('[data-view]').forEach(x => x.classList.toggle('active', x === el));
          render();
        });
      });
      // top tags
      const tagrow = document.getElementById('tagrow');
      const top = (state.meta?.tags || []).slice(0, 14);
      tagrow.innerHTML = '<span class="count">主题</span>'
        + top.map(t => `<span class="chip" data-tag="${esc(t.name)}">${esc(t.name)}<span class="n">${t.count}</span></span>`).join('');
      tagrow.querySelectorAll('[data-tag]').forEach(el => {
        el.addEventListener('click', () => {
          const t = el.dataset.tag;
          state.tag = state.tag === t ? null : t;
          tagrow.querySelectorAll('[data-tag]').forEach(x => x.classList.toggle('active', x.dataset.tag === state.tag));
          render();
        });
      });
      // years
      const yearrow = document.getElementById('yearrow');
      const years = state.meta?.years || [];
      yearrow.innerHTML = '<span class="count">年份</span>'
        + years.map(y => `<span class="chip" data-year="${y}">${y}</span>`).join('');
      yearrow.querySelectorAll('[data-year]').forEach(el => {
        el.addEventListener('click', () => {
          const y = el.dataset.year;
          state.year = String(state.year) === String(y) ? null : y;
          yearrow.querySelectorAll('[data-year]').forEach(x => x.classList.toggle('active', String(x.dataset.year) === String(state.year)));
          render();
        });
      });
    }

    fetch('../assets/data/poems.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        state.poems = data.poems || [];
        state.meta = { tags: data.tags, years: data.meta?.years };
        buildChips();
        render();
      })
      .catch(err => {
        document.getElementById('state').textContent = '诗集数据加载失败：' + err.message;
      });
  </script>
</body>
</html>
