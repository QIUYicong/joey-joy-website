<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诗岚观 · Joey's Joy</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-fill:   rgba(255,255,255,0.055);
      --glass-border: rgba(255,255,255,0.50);
      --warm-amber:   #c8a55a;
      --cool-mist:    #7a93a8;
      --jade:         #6b9e8d;
      --text-primary: #1a2540;
      --text-muted:   #475370;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background:
        radial-gradient(ellipse 75% 60% at 18% 15%, rgba(178,200,225,.85) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 85% 85%, rgba(145,175,205,.75) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 72% 28%, rgba(195,210,230,.55) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 28% 78%, rgba(155,180,210,.55) 0%, transparent 60%),
        linear-gradient(160deg, #6a7d96 0%, #4f637c 50%, #5a6f88 100%);
      color: var(--text-primary);
      min-height: 100vh;
    }

    #rain-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .light-bloom { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 1; }
    .light-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,220,150,0.18) 0%, transparent 70%); top: -180px; left: -100px; }
    .light-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(180,220,200,0.16) 0%, transparent 70%); bottom: -80px; right: 60px; }

    header {
      position: relative; z-index: 10;
      padding: 52px 56px 40px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(255,255,255,.28);
      backdrop-filter: blur(36px) saturate(1.4);
      box-shadow: 0 1px 0 rgba(255,255,255,.07), 0 8px 40px rgba(0,0,0,.5);
      display: flex; align-items: flex-end; gap: 48px;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 12px;
      color: var(--text-primary); text-decoration: none;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.6rem; letter-spacing: 3px;
      padding: 12px 28px;
      border: 1px solid rgba(200,165,90,0.35);
      border-radius: 1px;
      background: rgba(200,165,90,0.07);
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      position: absolute; top: 28px; left: 56px;
    }
    .back-btn:hover { color: var(--warm-amber); background: rgba(200,165,90,0.14); border-color: rgba(200,165,90,0.65); transform: translateX(-4px); }

    .header-text { flex: 1; }

    h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(4rem, 9vw, 7.5rem); font-weight: 400;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #1a2540 0%, #3b2a5e 50%, #1f3a5c 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 2px 1px rgba(255,255,255,.5)) drop-shadow(0 4px 12px rgba(20,30,55,.3));
    }

    .section-sub { margin-top: 14px; font-size: 1.3rem; letter-spacing: 4px; color: #3b4a6a; text-shadow: 0 1px 0 rgba(255,255,255,.4); text-transform: uppercase; }
    .header-rule { width: 48px; height: 1px; background: linear-gradient(90deg, var(--warm-amber), transparent); margin-top: 16px; opacity: 0.65; }

    .content { position: relative; z-index: 10; max-width: 1500px; margin: 0 auto; padding: 64px 56px 80px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .work-card {
      background: rgba(255,255,255,.40);
      backdrop-filter: blur(22px) saturate(1.3);
      padding: 0; cursor: pointer;
      transition: background 0.35s ease, box-shadow 0.35s ease;
      position: relative; overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 6px 24px rgba(20,30,55,.30);
    }
    .work-card:hover { background: rgba(255,255,255,.38); box-shadow: inset 0 1px 0 rgba(255,255,255,.70), 0 14px 40px rgba(20,30,55,.45), 0 1px 2px rgba(20,30,55,.20); }

    .work-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--warm-amber), transparent);
      opacity: 0; transition: opacity 0.35s ease;
    }
    .work-card:hover::after { opacity: 0.6; }

    .work-thumb {
      width: 100%; aspect-ratio: 5/3;
      background: rgba(255,255,255,.28);
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--glass-border);
      transition: opacity 0.35s ease;
    }
    .work-card:hover .work-thumb { opacity: 0.9; }
    .work-thumb svg { width: 200px; height: auto; }

    .work-info { padding: 40px 44px 44px; }

    .work-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3.2rem; font-weight: 400;
      letter-spacing: 3px; color: var(--text-primary);
      margin-bottom: 16px; transition: color 0.3s ease;
    }
    .work-card:hover .work-title { color: var(--warm-amber); }

    .work-date { font-size: 1.25rem; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 18px; }
    .work-desc { font-size: 1.35rem; line-height: 1.85; color: var(--text-muted); }

    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 36px;
      font-size: 0.9rem; letter-spacing: 2px; color: var(--text-muted);
      border-top: 1px solid var(--glass-border);
      background: rgba(255,255,255,.25);
      backdrop-filter: blur(20px);
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      header { padding: 52px 24px 32px; }
      .content { padding: 40px 24px; }
      h1 { font-size: 3rem; }
      .grid { grid-template-columns: 1fr; }
      .work-title { font-size: 2.4rem; }
      .work-info { padding: 28px 28px 32px; }
    }
  </style>
</head>
<body>

      <div class="work-card">

            <circle cx="60" cy="45" r="28" stroke="#3a2a08" stroke-width="1.2" fill="none" opacity="0.82"/>

            <path d="M20 70 Q40 30 60 15 Q80 30 100 70" stroke="#3a2a08" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.88"/>

            <path d="M15 60 Q35 40 60 35 Q85 40 105 60" stroke="#3a2a08" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.88"/>

  <footer>© 2026 Joey's Joy</footer>

  <script>
    (function(){
      const canvas = document.getElementById('rain-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
      resize(); window.addEventListener('resize', resize);

      const WIND = 0.17;
      const ripples = [];
      function rand(a,b){ return a + Math.random()*(b-a); }

      function spawn(init){
        const t = Math.random();
        const layer = t < 0.62 ? 0 : t < 0.88 ? 1 : 2;
        const cfg = [
          [0.0050, 0.55, 0.038, 0.13],
          [0.0090, 1.40, 0.082, 0.35],
          [0.0155, 2.80, 0.138, 0.62]
        ][layer];
        return {
          x: Math.random(), y: init ? Math.random() : rand(-0.09,0),
          vy: cfg[0]*rand(0.88,1.12), w: cfg[1]*rand(0.85,1.15),
          len: cfg[2]*rand(0.80,1.30), op: cfg[3]*rand(0.80,1.20), layer
        };
      }

      const drops = Array.from({length:240}, () => spawn(true));
      drops.sort((a,b) => a.layer - b.layer);

      function frame(){
        ctx.clearRect(0,0,W,H);

        for(let i = ripples.length-1; i >= 0; i--){
          const r = ripples[i];
          ctx.beginPath();
          ctx.ellipse(r.x, r.y, r.rx, r.rx*0.27, 0, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(155,210,255,${r.op})`;
          ctx.lineWidth = 0.8; ctx.stroke();
          r.rx += 2.6; r.op -= 0.05;
          if(r.op <= 0) ripples.splice(i,1);
        }

        drops.forEach((d,i) => {
          const x = d.x*W, y = d.y*H;
          const tl = d.len*H;
          const tx = x + WIND*tl, ty = y - tl;

          const g = ctx.createLinearGradient(tx,ty,x,y);
          g.addColorStop(0, 'rgba(130,195,245,0)');
          g.addColorStop(0.52, `rgba(172,220,255,${d.op*0.42})`);
          g.addColorStop(1, `rgba(218,243,255,${d.op})`);
          ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(x,y);
          ctx.strokeStyle = g; ctx.lineWidth = d.w; ctx.lineCap = 'round'; ctx.stroke();

          if(d.layer >= 1){
            const gr = ctx.createRadialGradient(x,y,0,x,y,d.w*2.7);
            gr.addColorStop(0,    `rgba(198,234,255,${d.op*0.55})`);
            gr.addColorStop(0.55, `rgba(172,216,255,${d.op*0.18})`);
            gr.addColorStop(1,    'rgba(140,196,246,0)');
            ctx.beginPath(); ctx.arc(x,y,d.w*2.7,0,Math.PI*2);
            ctx.fillStyle = gr; ctx.fill();

            ctx.beginPath(); ctx.arc(x,y,d.w*0.90,0,Math.PI*2);
            ctx.fillStyle = `rgba(226,246,255,${d.op*0.80})`; ctx.fill();

            ctx.beginPath(); ctx.arc(x-d.w*0.28, y-d.w*0.30, d.w*0.36, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${d.op})`; ctx.fill();
          }

          d.y += d.vy; d.x -= WIND*d.vy*0.55;
          if(d.y > 1.04){
            if(d.layer === 2 && Math.random() > 0.37)
              ripples.push({x: d.x*W, y: H-1, rx: d.w*2.0, op: d.op*0.54});
            drops[i] = spawn(false);
          }
        });
        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>

  <script>
    /* card-click wiring */
    document.querySelectorAll('.work-card').forEach(c => {
      c.style.cursor = 'pointer';
      c.addEventListener('click', e => {
        if (e.target.closest('a')) return; // let inner <a> through
        const t = c.querySelector('.work-title')?.textContent.trim() || '';
        const d = c.querySelector('.work-date')?.textContent.trim() || '';
        location.href = 'article.html?from=poetry'
          + '&title=' + encodeURIComponent(t)
          + '&date='  + encodeURIComponent(d);
      });
    });
  </script>
