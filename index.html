<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joey's Joy</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-fill:   rgba(255,255,255,0.055);
      --glass-border: rgba(255,255,255,0.50);
      --amber:        #c8a55a;
      --mist:         #7a93a8;
      --jade:         #6b9e8d;
      --fg:           #1a2540;
      --fg-dim:       #4a5872;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background:
        radial-gradient(ellipse 75% 60% at 18% 15%, rgba(178,200,225,.85) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 85% 85%, rgba(145,175,205,.75) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 72% 28%, rgba(195,210,230,.55) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 28% 78%, rgba(155,180,210,.55) 0%, transparent 60%),
        linear-gradient(160deg, #6a7d96 0%, #4f637c 50%, #5a6f88 100%);
      font-family: 'Noto Serif SC', serif;
      color: var(--fg);
    }

    #rain { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .glow {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 1;
    }
    .glow-a { width:700px; height:700px;
      background: radial-gradient(circle, rgba(255,220,150,0.18) 0%, transparent 70%);
      top: -220px; left: -160px; }
    .glow-b { width:480px; height:480px;
      background: radial-gradient(circle, rgba(180,220,200,0.16) 0%, transparent 70%);
      bottom: -120px; right: -90px; }

    .page {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      padding: 36px 60px 28px;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      background: rgba(255,255,255,.28);
      backdrop-filter: blur(36px) saturate(1.4);
      box-shadow: 0 1px 0 rgba(255,255,255,.07), 0 8px 40px rgba(0,0,0,.5);
      animation: up .9s cubic-bezier(.22,1,.36,1) both;
    }

    h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 400;
      letter-spacing: .14em; line-height: 1;
      background: linear-gradient(90deg,
        #ff6b6b, #ffa94d, #ffe066, #69db7c,
        #4dabf7, #845ef7, #f06595, #ff6b6b
      );
      background-size: 250% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 2px 1px rgba(255,255,255,.4)) drop-shadow(0 4px 18px rgba(20,30,55,.25));
      animation: rainbow-flow 4s linear infinite;
    }
    @keyframes rainbow-flow {
      0%   { background-position: 0% center; }
      100% { background-position: 250% center; }
    }

    .tagline {
      margin-top: 14px;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      letter-spacing: .3em; color: #2a3a5c;
      text-shadow: 0 1px 0 rgba(255,255,255,.4);
    }

    .portals {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 0;
      animation: up .9s cubic-bezier(.22,1,.36,1) .1s both;
    }

    .portal:nth-child(1), .portal:nth-child(2) { grid-column: span 3; }
    .portal:nth-child(3), .portal:nth-child(4), .portal:nth-child(5) { grid-column: span 2; }

    .portal {
      position: relative;
      text-decoration: none; color: var(--fg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px;
      border: 1px solid var(--glass-border); border-top: none;
      background: rgba(255,255,255,.30);
      backdrop-filter: blur(30px) saturate(1.4);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65), inset 0 -1px 0 rgba(40,55,90,.18), 0 10px 32px rgba(20,30,55,.30), 0 1px 3px rgba(20,30,55,.20);
      overflow: hidden;
      transition: background .4s, border-color .4s, box-shadow .4s;
      cursor: pointer;
    }

    .portal:nth-child(2),
    .portal:nth-child(4),
    .portal:nth-child(5) { border-left: none; }

    .portal::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .portal::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      opacity: 0; transition: opacity .4s;
    }
    .portal:hover::after { opacity: .8; }

    .portal:hover {
      background: rgba(255,255,255,.45);
      border-color: rgba(200,165,90,.50);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.80), 0 18px 52px rgba(20,30,55,.45), 0 2px 6px rgba(20,30,55,.25);
    }

    .portal-icon {
      width: clamp(90px, 12vw, 140px); height: clamp(90px, 12vw, 140px);
      transition: transform .4s cubic-bezier(.22,1,.36,1), filter .4s;
    }
    .portal:hover .portal-icon {
      transform: scale(1.12) translateY(-4px);
      filter: drop-shadow(0 6px 20px rgba(200,165,90,.4));
    }

    .portal-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(2.4rem, 4.5vw, 4.5rem);
      font-weight: 400; letter-spacing: .12em;
      transition: color .35s; text-align: center;
    }
    .portal:hover .portal-title { color: #5b3a08; }

    .portal-sub {
      font-size: clamp(.85rem, 1.2vw, 1.1rem);
      color: var(--fg-dim); letter-spacing: .15em;
      text-align: center; line-height: 1.7; text-transform: uppercase;
    }

    .foot {
      padding: 22px 60px; text-align: center;
      border-top: 1px solid var(--glass-border);
      background: rgba(255,255,255,.32);
      backdrop-filter: blur(24px);
      font-size: .95rem; letter-spacing: .15em; color: var(--fg-dim);
      animation: up .9s cubic-bezier(.22,1,.36,1) .2s both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <script>
    (function(){
      const cv = document.getElementById('rain');
      const cx = cv.getContext('2d');
      let W, H;
      function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
      resize(); window.addEventListener('resize', resize);

      const WIND = 0.17;
      const ripples = [];
      function rand(a,b){ return a + Math.random()*(b-a); }

      function mkDrop(init){
        const t = Math.random();
        const layer = t < 0.62 ? 0 : t < 0.88 ? 1 : 2;
        // [speed, strokeWidth, tailLen, opacity]
        const cfg = [
          [0.0050, 0.55, 0.038, 0.13],
          [0.0090, 1.40, 0.082, 0.35],
          [0.0155, 2.80, 0.138, 0.62]
        ][layer];
        return {
          x:   Math.random(),
          y:   init ? Math.random() : rand(-0.09, 0),
          vy:  cfg[0] * rand(0.88, 1.12),
          w:   cfg[1] * rand(0.85, 1.15),
          len: cfg[2] * rand(0.80, 1.30),
          op:  cfg[3] * rand(0.80, 1.20),
          layer
        };
      }

      const drops = Array.from({length: 240}, () => mkDrop(true));
      drops.sort((a,b) => a.layer - b.layer); // painter's order

      function frame(){
        cx.clearRect(0, 0, W, H);

        // ── ripples ──
        for(let i = ripples.length-1; i >= 0; i--){
          const r = ripples[i];
          cx.beginPath();
          cx.ellipse(r.x, r.y, r.rx, r.rx * 0.27, 0, 0, Math.PI*2);
          cx.strokeStyle = `rgba(155,210,255,${r.op})`;
          cx.lineWidth = 0.8;
          cx.stroke();
          r.rx += 2.6; r.op -= 0.05;
          if(r.op <= 0) ripples.splice(i, 1);
        }

        // ── drops ──
        drops.forEach((d, i) => {
          const x = d.x * W, y = d.y * H;
          const tl = d.len * H;
          const tx = x + WIND * tl, ty = y - tl; // angled tail origin

          // streak
          const g = cx.createLinearGradient(tx, ty, x, y);
          g.addColorStop(0,    'rgba(130,195,245,0)');
          g.addColorStop(0.52, `rgba(172,220,255,${d.op*0.42})`);
          g.addColorStop(1,    `rgba(218,243,255,${d.op})`);
          cx.beginPath(); cx.moveTo(tx, ty); cx.lineTo(x, y);
          cx.strokeStyle = g; cx.lineWidth = d.w; cx.lineCap = 'round'; cx.stroke();

          // head glow (mid + fg only)
          if(d.layer >= 1){
            const gr = cx.createRadialGradient(x, y, 0, x, y, d.w*2.7);
            gr.addColorStop(0,   `rgba(198,234,255,${d.op*0.55})`);
            gr.addColorStop(0.55,`rgba(172,216,255,${d.op*0.18})`);
            gr.addColorStop(1,   'rgba(140,196,246,0)');
            cx.beginPath(); cx.arc(x, y, d.w*2.7, 0, Math.PI*2);
            cx.fillStyle = gr; cx.fill();

            // bright core
            cx.beginPath(); cx.arc(x, y, d.w*0.90, 0, Math.PI*2);
            cx.fillStyle = `rgba(226,246,255,${d.op*0.80})`; cx.fill();

            // specular highlight
            cx.beginPath(); cx.arc(x - d.w*0.28, y - d.w*0.30, d.w*0.36, 0, Math.PI*2);
            cx.fillStyle = `rgba(255,255,255,${d.op})`; cx.fill();
          }

          d.y += d.vy;
          d.x -= WIND * d.vy * 0.55;

          if(d.y > 1.04){
            if(d.layer === 2 && Math.random() > 0.37)
              ripples.push({ x: d.x*W, y: H-1, rx: d.w*2.0, op: d.op*0.54 });
            drops[i] = mkDrop(false);
          }
        });

        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>

</body>
